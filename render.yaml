services:
  # --- Streamlit UI ---
  - type: web
    name: support-agent-ui
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run ui.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GITHUB_TOKEN
        sync: false                          # you will paste this in Render dashboard
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma_db
      - key: AUDIT_LOG_PATH
        value: data/audit_log.json
      - key: MAX_REFUND_AMOUNT_USD
        value: "500.00"

  # --- FastAPI Backend ---
  - type: web
    name: support-agent-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: CHROMA_PERSIST_DIR
        value: ./data/chroma_db
      - key: AUDIT_LOG_PATH
        value: data/audit_log.json
      - key: MAX_REFUND_AMOUNT_USD
        value: "500.00"
